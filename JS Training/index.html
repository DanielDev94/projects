<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forex Data Parser</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        padding: 20px;
        background-color: #f4f4f9;
      }
      .dashboard-card {
        background: white;
        padding: 20px;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        max-width: 400px;
      }
      button {
        background: #007bff;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
        margin-bottom: 15px;
      }
      button:hover {
        background: #0056b3;
      }
      #output {
        margin-top: 10px;
        line-height: 1.6;
      }
      .bullish {
        color: green;
        font-weight: bold;
      }
      .bearish {
        color: red;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="dashboard-card">
      <h2>Weekly Market Analysis</h2>
      <button id="analyzeBtn">Run Analysis</button>

      <div id="output">
        <p>Waiting for data...</p>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
