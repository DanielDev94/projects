<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Learning Javascript</title>
  </head>
  <body>
    <div id="dashboard">
      <h1>Citizens Reporting Dashboard</h1>

      <input
        type="text"
        id="report-input"
        placeholder="Describe the incident..."
      />
      <button id="submit-report-btn">Submit Report</button>

      <h2>Total Reports Filed: <span id="total-count">0</span></h2>
      <h3>Latest Report: <span id="latest-report">None yet</span></h3>
    </div>
    <script src="script.js"></script>
  </body>
</html>
